<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Animation classes</title>
</head>
<body>
    <div class="bg-pink-400 size-20 mt-20 ml-20 rounded-full transition  duration-2000 hover:bg-pink-600 animate-bounce"></div>
    <hr>
    <div class="size-20 mt-20 ml-20 rounded-full bg-linear-to-t from-red-500 via-yellow-400 to-orange-500 animate-spin"></div>
    <div class="size-15 mt-20 ml-20 rounded-full bg-conic from-red-500 via-yellow-400 to-violet-500 animate-ping"></div>
    <div class="animate-pulse size-10 rounded-full bg-green-300 ml-20 mt-20"></div>
</body>
</html>
