<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Grid Class</title>
</head>
<body>
    <div class="grid grid-cols-2 sm:grid-cols-3 gap-1">
        <div class="bg-blue-300 col-span-2 border border-red-300 p-6">Div1</div>
        <div class="bg-blue-400 border border-red-300 p-6">Div 2</div>
        <div class="bg-blue-500 row-span-2 border border-red-300 p-6">Div 3</div>
        <div class="bg-blue-600 border border-red-300 p-6">Div 4</div>
        <div class="bg-blue-700 border border-red-300 p-6 row-span-4">Div 5</div>
        <div class="bg-blue-800 border border-red-300 p-6">Div 6</div>
        <div class="bg-blue-900 border border-red-300 p-6">Div 7</div>
        <div class="bg-blue-200 border border-red-300 p-6">Div 8</div>
    </div>
    
</body>
</html>
