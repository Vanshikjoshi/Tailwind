<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Boarder class</title>
</head>

<body>
    <div class=" border-2 border-blue-500 m-2 text-center w-96 h-10">Simple border</div>
    <div
        class=" border-t-yellow-600 border-r-blue-600 border-b-green-600 border-l-red-600 m-2 text-center border-4 w-96 h-10">
        different color border</div>
    <div></div>
    <div class=" border-2 border-t-6 border-b-5 border-r-0 border-blue-500 m-2 text-center w-96 h-10">Border with
        different widths</div>
    <div
        class=" border-4 border-blue-600 border-t-pink-600 border-b-yellow-600 m-2 text-center size-30 p-4 rounded-full">
        Round border</div>
    <div class=" border-2 border-green-500 m-2 text-center w-96 h-10 rounded-t-full">only two side rounded border</div>
    <div class=" border-2 border-gray-500 m-2 text-center w-96 h-10 rounded-ee-2xl">One side rounded border</div>
    <div class=" border-2 border-red-800 m-2 text-center size-20 p-4 rounded-t-full border-dotted">dotted border</div>

</body>

</html>
