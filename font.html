<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>font classes</title>
</head>
<body>
    <p class="text-xl">Lorem ipsum dolor sit amet.</p>
    <p class="font-sans text-2xl">Lorem ipsum dolor sit amet.</p> <!--by default font is sans-serif-->    
    <p class="font-serif text-lg">lorem ipsum dolor sit amet.</p>
    <p class="font-mono text-base">lorem ipsum dolor sit amet.</p>
    <p class="font-thin">lorem ipsum dolor sit amet.</p>
    <p class="font-extralight">lorem ipsum dolor sit amet.</p>
    <p class="font-medium">lorem ipsum dolor sit amet.</p>
    <p class="font-normal">lorem ipsum dolor sit amet.</p>
    <p class="font-bold">lorem ipsum dolor sit amet.</p>
    <p class="font-extrabold">lorem ipsum dolor sit amet.</p>

</body>
</html>
