<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Transition Vs Transform</title>
</head>

<body>
    <button class="bg-blue-400 hover:bg-blue-700 h-10 w-20 m-20 text-white font-bold p-auto rounded">click</button>
    <button
        class="bg-blue-400 hover:bg-blue-700 h-10 w-20 m-20 text-white font-bold p-auto rounded transition duration-1000">click
        1</button>
    <button
        class="bg-blue-400 hover:opacity-5 h-10 w-20 m-20 text-white font-bold p-auto rounded transition duration-1000 ">click
        2</button>
        <button class="bg-blue-400 hover:bg-blue-800 hover:rotate-360 h-10 w-20 m-20 text-white font-bold p-auto rounded transition-transform duration-2000">click 3</button>
        <button class="bg-blue-400 hover:bg-blue-700 h-10 w-20 m-20 text-white font-bold p-auto rounded transition duration-1000 hover:scale-105">click 4</button>

</body>

</html>
