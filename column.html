    </div>
    <div class="lg:columns-4 mt-10 sm:columns-2">

        <img src="coffee.webp" alt="Coffee">
        <img src="coffee.webp" alt="Coffee">
        <img src="coffee.webp" alt="Coffee">
    </div>
    <div class="columns-3xs mt-10">
        <img src="coffee.webp" alt="Coffee">
        <img src="coffee.webp" alt="Coffee">
        <img src="coffee.webp" alt="Coffee">
        <img src="coffee.webp" alt="Coffee">

        <img src="coffee.webp" alt="Coffee">
    </div>

</body>

</html>
