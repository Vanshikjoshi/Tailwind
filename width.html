<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>All about Width</title>
</head>

<body>
    <h1 class="bg-pink-300 text-center font-bold text-2xl">Width</h1>
    <div class="bg-blue-300 w-22">
        This is a div
    </div>
    <div class="bg-amber-200 max-w-70">
        This is div with max-width
    </div>
    <div class="min-w-100 bg-amber-400 w-60">
        This is a div with minimum width
    </div>
    <div class="w-full bg-amber-500">Full Width</div>
    <div class="w-fit bg-amber-600">Fit Width</div>
    <div class="w-auto bg-amber-700">
        This is a div with auto width
    </div>
    <div class="w-xs bg-amber-800">Extra Small Width</div>
    <div class="w-xl bg-amber-900">Extra Large Width</div>
    <div class="w-[100px] bg-amber-100">
        This is a div with custom width
    </div>
    <div class="w-1/2 bg-amber-200">
        This is a div with half width or 50% width of parent
    </div>
</body>

</html>
