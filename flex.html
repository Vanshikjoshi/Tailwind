<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Flexbox property</title>
</head>

<body class="h-screen">
    <div class="flex gap-2 mb-3 justify-center  bg-gray-300">
        <div class="bg-red-300 size-20"></div>
        <div class="bg-yellow-300 size-20"></div>
        <div class="bg-pink-300 size-20"></div>
        <div class="bg-blue-300 size-20"></div>
    </div>
    <div class="flex items-center flex-col-reverse bg-gray-300">
        <div class="bg-red-300 size-20"></div>
        <div class="bg-yellow-300 size-20"></div>
        <div class="bg-pink-300 size-20"></div>
        <div class="bg-blue-300 size-20"></div>
    </div>
    <div class="size-full bg-purple-500 flex flex-col flex-wrap content-start sm:flex-row gap-2">
        <div class="bg-red-100 size-25"></div>
        <div class="bg-red-200 size-25"></div>
        <div class="bg-red-300 size-25"></div>
        <div class="bg-red-400 size-25"></div>
        <div class="bg-red-500 size-25"></div>
        <div class="bg-red-600 size-25"></div>
        <div class="bg-red-700 size-25"></div>
        <div class="bg-red-800 size-25"></div>
        <div class="bg-red-900 size-25"></div>
        <div class="bg-red-800 size-25"></div>
        <div class="bg-red-700 size-25"></div>
        <div class="bg-red-600 size-25"></div>
    </div>
</body>

</html>
