<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Filter classes</title>
</head>
<body>
    <div class="flex flex-wrap gap-1">
    <img src="coffee.webp" class="size-50 m-auto">
    <img src="coffee.webp" class="blur size-50 m-auto">
    <img src="coffee.webp" class="blur-sm size-50 m-auto">
    <img src="coffee.webp" class="blur-md size-50 m-auto">
    <img src="coffee.webp" class="blur-3xl size-50 m-auto">
    </div>
    <h1>brightness-</h1>
    <div class="flex flex-wrap gap-1">
    <img src="coffee.webp" class="brightness-50 size-50 m-auto">
    <img src="coffee.webp" class="brightness-75 size-50 m-auto">
    <img src="coffee.webp" class="brightness-100 size-50 m-auto">
    <img src="coffee.webp" class="brightness-125 size-50 m-auto">
    </div>
    <h1>contrast-</h1>
    <div class="flex flex-wrap gap-1">
    <img src="coffee.webp" class="contrast-50 size-50 m-auto">
    <img src="coffee.webp" class="contrast-75 size-50 m-auto">
    <img src="coffee.webp" class="contrast-100 size-50 m-auto">
    <img src="coffee.webp" class="contrast-200 size-50 m-auto">
    </div>
    <h1>Grayscale-</h1>
    <div class="flex flex-wrap gap-1">
    <img src="coffee.webp" class="grayscale size-50 m-auto">
    <img src="coffee.webp" class="grayscale-0 size-50 m-auto">
    <img src="coffee.webp" class="grayscale-50 size-50 m-auto">
    <img src="coffee.webp" class="grayscale-100 size-50 m-auto">
    </div>
    <h1>invert-</h1>
    <div class="flex flex-wrap gap-1">
    <img src="coffee.webp" class="invert size-50 m-auto">
    <img src="coffee.webp" class="invert-0 size-50 m-auto">
    <img src="coffee.webp" class="invert-50 size-50 m-auto">
    <img src="coffee.webp" class="invert-100 size-50 m-auto">
    </div>
    <h1>hue-rotate-</h1>
    <div class="flex flex-wrap gap-1">
    <img src="coffee.webp" class="hue-rotate-60 size-50 m-auto">
    <img src="coffee.webp" class="hue-rotate-180 size-50 m-auto">
    <img src="coffee.webp" class="hue-rotate-240 size-50 m-auto">
    </div>
</body>
</html>
